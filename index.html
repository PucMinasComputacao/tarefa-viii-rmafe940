<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mini Catálogo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #141414;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #1f1f1f;
      border-bottom: 2px solid red;
    }

    h1 {
      color: red;
    }

    main {
      padding: 20px;
    }

    #output {
      background: #1f1f1f;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
    }

    #catalogo-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }

    .card {
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
    }

    .badge {
      padding: 3px 8px;
      font-size: 12px;
      border-radius: 5px;
    }

    .filme {
      background: red;
    }

    .serie {
      background: blue;
    }
  </style>
</head>

<body>

<header>
  <h1>🎬 Mini Catálogo</h1>
  <p>Abra o Console (F12)</p>
</header>

<main>

  <div id="output"></div>

  <h2>Catálogo</h2>
  <div id="catalogo-container"></div>

</main>

<script src="script.js"></script>

</body>
</html>
